<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Use Case Diagram — Employee Payroll Management System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:'DM Sans',sans-serif;color:#1a1f2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 60px}
h1{font-size:clamp(1.3rem,3vw,1.9rem);font-weight:700;margin-bottom:4px;text-align:center;color:#1a1f2e;letter-spacing:-0.5px}
.subtitle{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8896b0;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;text-align:center}
.diagram-wrap{background:#ffffff;border:1.5px solid #dde3ef;border-radius:20px;padding:28px;overflow-x:auto;max-width:1160px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
svg{display:block;margin:0 auto;font-family:'DM Sans',sans-serif}
.legend{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;margin-top:22px;max-width:1000px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#5a6680}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.legend-line{width:26px;height:2px;flex-shrink:0;border-top:2px dashed}
.btn-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all 0.2s;display:flex;align-items:center;gap:7px}
.btn-download{background:#1e40af;color:#fff}
.btn-download:hover{background:#1d3a9a;box-shadow:0 4px 16px rgba(30,64,175,0.3)}
.btn-print{background:#f1f5f9;color:#334155;border:1.5px solid #dde3ef}
.btn-print:hover{background:#e2e8f0}
@media print{
  body{background:#fff;padding:10px}
  .diagram-wrap{border:none;box-shadow:none;padding:0}
  .btn-row,.legend,h1,.subtitle{display:none}
  svg{width:100%;height:auto}
}
</style>
</head>
<body>

<h1>Use Case Diagram</h1>
<div class="subtitle">// Employee Payroll Management System</div>

<div class="diagram-wrap" id="diagramWrap">
<svg id="mainSvg" viewBox="0 0 1120 960" width="100%" xmlns="http://www.w3.org/2000/svg">

    <!-- Arrows -->

    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">

  <text x="560" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="0.5">Employee Payroll Management System</text>

  const svg=document.getElementById('mainSvg');

  const blob=new Blob([data],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);

}
